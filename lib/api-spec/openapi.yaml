components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ─── DASHBOARD ─────────────────────────────────────────────
    DashboardSummary:
      type: object
      properties:
        totalProjects:
          type: integer
        activeProjects:
          type: integer
        atRiskProjects:
          type: integer
        totalRevenue:
          type: number
        outstandingInvoices:
          type: number
        billableHoursThisMonth:
          type: number
        teamUtilization:
          type: number
        upcomingDeadlines:
          type: integer
      required:
        - totalProjects
        - activeProjects
        - atRiskProjects
        - totalRevenue
        - outstandingInvoices
        - billableHoursThisMonth
        - teamUtilization
        - upcomingDeadlines

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        userName:
          type: string
        userInitials:
          type: string
        projectName:
          type: ["string", "null"]
        timestamp:
          type: string
        icon:
          type: string
      required:
        - id
        - type
        - description
        - userName
        - userInitials
        - timestamp
        - icon

    # ─── ACCOUNT ────────────────────────────────────────────────
    Account:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        domain:
          type: string
        tier:
          type: string
        region:
          type: string
        status:
          type: string
        contractValue:
          type: number
        billingAddress:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        convertedFromProspectId:
          type: integer
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - domain
        - tier
        - region
        - status
        - contractValue
        - createdAt
        - updatedAt

    CreateAccountBody:
      type: object
      properties:
        name:
          type: string
